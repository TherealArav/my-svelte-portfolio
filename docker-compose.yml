version: '3.8'

services:
  portfolio:
    build: .
    container _name: svelte-portfolio
    ports:
      # Maps port 3000 on your VPS to port 3000 inside the container
      - "3000:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - ORIGIN=http://your-vps-ip-address:3000 # We will update this to your domain later